{% extends "base.html" %}{% block content %}<section class="card"><h1>Painel do crupiê</h1>{% for b in bets %}<div class="item"><b>#{{b.id}} {{b.creator}} vs {{b.opponent}}</b><span>{{b.amount}} fichas</span><form method="post" action="{{url_for('resolve',bid=b.id)}}"><select name="winner_id"><option value="{{b.creator_id}}">{{b.creator}} venceu</option><option value="{{b.opponent_id}}">{{b.opponent}} venceu</option></select><button>Aprovar</button></form><form method="post" action="{{url_for('cancel_bet',bid=b.id)}}"><button class="danger">Cancelar</button></form></div>{% else %}<p>Nenhuma aposta pendente.</p>{% endfor %}</section>{% endblock %}
