{% extends "base.html" %}{% block content %}<section class="card narrow"><h1>Criar aposta</h1><form method="post"><label>Adversário</label><select name="opponent_id">{% for p in players %}<option value="{{p.id}}">{{p.username}} — {{p.balance}} fichas</option>{% endfor %}</select><label>Crupiê online</label><select name="dealer_id">{% for d in dealers %}<option value="{{d.id}}">{{d.username}}</option>{% endfor %}</select><input name="amount" type="number" min="1" placeholder="Quantidade de fichas"><button>Enviar ao crupiê</button></form>{% if not dealers %}<p>Nenhum crupiê online.</p>{% endif %}</section>{% endblock %}
