{% extends "base.html" %}{% block content %}<section class="card"><h1>Ranking</h1><table><tr><th>#</th><th>Jogador</th><th>Cargo</th><th>Fichas</th><th></th></tr>{% for u in users %}<tr><td>{{loop.index}}º</td><td>{{u.username}}</td><td><span class="role" style="border-color:{{u.role_color}}">{{u.role_label}}</span></td><td>{{"{:,}".format(u.balance).replace(",",".")}}</td><td><a href="{{url_for('profile',username=u.username)}}">perfil</a></td></tr>{% endfor %}</table></section>{% endblock %}
