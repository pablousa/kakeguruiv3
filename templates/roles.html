{% extends "base.html" %}{% block content %}<div class="grid"><section class="card"><h1>Criar cargo</h1><form method="post"><input name="name" placeholder="nome_interno"><input name="label" placeholder="Nome exibido"><input name="color" type="color" value="#ff3b8d"><label><input type="checkbox" name="can_deal">Crupiê</label><label><input type="checkbox" name="can_money">Mexer em fichas</label><label><input type="checkbox" name="can_roles">Gerenciar cargos</label><label><input type="checkbox" name="can_badges">Gerenciar insígnias</label><label><input type="checkbox" name="can_market">Moderar marketplace</label><label><input type="checkbox" name="can_admin">Admin total</label><button>Criar</button></form></section><section class="card"><h1>Atribuir cargo</h1>{% for u in users %}<form class="row" method="post" action="{{url_for('set_role')}}"><span>{{u.username}}</span><input type="hidden" name="user_id" value="{{u.id}}"><select name="role_id">{% for r in roles %}<option value="{{r.id}}" {% if r.id==u.role_id %}selected{% endif %}>{{r.label}}</option>{% endfor %}</select><button>OK</button></form>{% endfor %}</section></div><section class="card"><h2>Cargos</h2><table>{% for r in roles %}<tr><td><span class="role" style="border-color:{{r.color}}">{{r.label}}</span></td><td>{{r.name}}</td><td>deal {{r.can_deal}}</td><td>money {{r.can_money}}</td><td>badges {{r.can_badges}}</td></tr>{% endfor %}</table></section>{% endblock %}
