{% extends "base.html" %}{% block content %}<div class="grid"><section class="card"><h1>Dar/remover fichas</h1><form method="post" action="{{url_for('admin_money')}}"><select name="user_id">{% for u in users %}<option value="{{u.id}}">{{u.username}} — {{u.balance}} fichas</option>{% endfor %}</select><select name="action"><option value="add">Adicionar</option><option value="remove">Remover</option></select><input name="amount" type="number" min="1" placeholder="Quantidade"><input name="description" placeholder="Motivo"><button>Aplicar</button></form></section><section class="card"><h2>Histórico</h2>{% for h in hist %}<div class="item"><b>{{h.user}}: {{h.amount}}</b><span>{{h.description}} • por {{h.admin or "sistema"}}</span></div>{% endfor %}</section></div>{% endblock %}
